---
- name: Setup Docker and deploy container
  hosts: all
  become: yes

  tasks:

    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Pull nginx image
      docker_container:
        name: nginx_container
        image: nginx
        state: started
        ports:
          - "8080:80"
